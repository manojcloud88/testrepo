name: myfirstpipeline

on:
  workflow_dispatch:

jobs:
  clone-repo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout external public repo
        uses: actions/checkout@v4
        with:
          repository: manojcloud88/testrepo
          ref: main
          path: external-repo  # Clones into ./external-repo

      - name: List files to verify
        run: ls -R external-repo  # Fixed: Removed invalid text

      - name: Additional verification (optional)
        run: |
          pwd
          ls -la
          find external-repo -type f | head -10  # Shows first 10 files
